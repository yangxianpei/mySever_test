version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: myapp-backend
    ports:
      - "3000:3000"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: myapp-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend